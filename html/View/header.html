<html lang="zh-TW">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --sidebar-width: 250px;
      --sidebar-collapsed-width: 70px;
      --topbar-height: 56px;

      --menu-left: 22px;
      --icon-width: 20px;
      --icon-gap: 14px;

      --bg-body: #0d1117;
      --bg-panel:  #0d1117;
      --border:  #0d1117;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --hover: #1e2730;
    }

    #sidebar-wrapper, #page-wrapper, #topbar { transition: all 0.3s ease; }

    body {
      font-size: 15px !important;
      font-family: Tahoma;
      background-color: var(--bg-body);
      color: var(--text);
      height: 100%;
    }
    .form-control, .btn, .menu-item { font-size: 16px !important; }

    /* ===============================
       Sidebar
    =============================== */
    #sidebar-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background-color: var(--bg-panel);
      z-index: 999;
      overflow-y: auto;
      overflow-x: hidden;
      border-right: none !important;
      box-shadow: none !important;
      margin-bottom: 80px;
      margin-left: 10px;
    }
    #sidebar-wrapper::-webkit-scrollbar { display: none; }
    #sidebar-wrapper { -ms-overflow-style: none; scrollbar-width: none; }

    body.sidebar-collapsed #sidebar-wrapper { width: var(--sidebar-collapsed-width); }
/* ===============================
   Topbar（✅深色：跟原本 dashboard 一致）
=============================== */
#topbar {
  position: fixed;
  top: 0;
  left: var(--sidebar-width);
  right: 0;
  height: var(--topbar-height);
 margin-top: 10px;
  z-index: 1000;

  display: flex;
  align-items: center;
  justify-content: flex-start;   /* ✅改這個 */
  gap: 14px;
  padding: 0 16px;
}
body.sidebar-collapsed #topbar { left: var(--sidebar-collapsed-width); }

/* ✅ 左側整排：漢堡 + Home + Search */
.topbar-left{
  display:flex;
  align-items:center;
  gap: 12px;
    flex: 0 0 auto;   /* ✅不要撐滿 */

}

/* ✅ 搜尋容器：放在左側，靠近 Home */
.topbar-search{
  position: relative;
  width: min(680px, 60vw);      /* ✅你可調，靠近home後不用那麼長 */
  margin-left: 6px;
}

/* ✅ 移除原本右側置中那套（避免影響） */
.topbar-right{
  display:none;                 /* ✅不需要了（你會改 HTML） */
}

.sidebar-header{
  position: sticky;
  top: 0;
  z-index: 50;                      /* ✅比內容高就不會穿透 */
  background: var(--bg-panel);      /* ✅實心背景 */
  backdrop-filter: none;            /* ✅不要模糊 */
  opacity: 1;                       /* ✅不要透明 */
  border-bottom: 1px solid var(--border);

  /* ✅讓標題區塊高度固定，滑動時更穩 */
  min-height: 64px;
  display: flex;
  align-items: center;

  padding: 14px 12px 14px 20px;
}

/* ✅ OP 小工具 + icon：margin-top/left */
.app-title{
  margin-top: 10px;
  margin-left: 10px;
}

/* icon 跟文字一起移動，通常 app-title 設就夠
   如果你覺得 icon 還沒跟到，再補： */
.app-title i{
  margin-top: 0;
  margin-left: 0;
}

/* 左側按鈕（☰） */
.topbar-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.topbar-btn:hover {
  background: #1f2937;         /* ✅hover 深灰 */
  border-color: var(--border);
}
/* Home 圓圈：預設 */
.home-pill {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  color: rgba(240,253,244,0.95);
  background: transparent;      /* 跟漢堡一樣預設透明 */
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: all 0.2s ease;    /* ✅跟漢堡的 hover 手感一致 */
}

/* ✅Home hover：跟漢堡選單一樣 */
.home-pill:hover {
  background: #1f2937;          /* 同 topbar-btn:hover */
  border-color: var(--border);  /* 同 topbar-btn:hover 的邊框邏輯 */
  color: var(--text);           /* hover 時 icon 變成一致的文字色 */
}



.search-wrap {
  position: relative;
  width: min(860px, 100%);     /* ✅避免太長爆版 */
}

/* 搜尋框：深色、內凹、跟卡片一致 */
.search-box {
  width: 100%;
  height: 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0d1117;          /* ✅深色 */
  color: var(--text);
  padding: 0 500px 0 44px;
  outline: none;
  font-size: 15px;
}
.search-box::placeholder {
  color: #6b7280;
}
.search-box:focus {
  border-color: rgba(88,166,255,0.65);       /* 你原本藍系的感覺 */
  box-shadow: 0 0 0 3px rgba(88,166,255,0.18);
}

/* 搜尋 icon */
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #8b949e;
  pointer-events: none;
}

/* Ctrl+K 提示：深色小膠囊 */
.kbd-hint {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #c9d1d9;
  border: 1px solid var(--border);
  background: #111827;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 12px;
  user-select: none;
}

/* 下拉結果：改成深色卡片風格 */
#tool-search-results {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: none;
  z-index: 2000;
  box-shadow: 0 14px 34px rgba(0,0,0,0.45);
}

.result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
}
.result-item:hover,
.result-item.active {
  background: var(--hover);
}
.result-item i {
  width: 18px;
  text-align: center;
  color: #8b949e;
}
.result-item .path {
  margin-left: auto;
  color: #8b949e;
  font-size: 12px;
  white-space: nowrap;
}
.result-empty {
  padding: 12px;
  color: #8b949e;
  font-size: 13px;
}

    /* ===============================
       Page Wrapper（✅避開 topbar）
    =============================== */
    #page-wrapper {
      margin-left: var(--sidebar-width);
      padding: 20px;
      padding-top: calc(20px + var(--topbar-height));
      min-height: 100vh;
      background-color: var(--bg-body);
      padding-bottom: 50px;
      border-left: none !important;
      box-shadow: none !important;

    /* ===============================
       Sidebar Header（只留 OP 小工具，❌不放收合按鈕）
    =============================== */
    .sidebar-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background-color: var(--bg-panel);
      display: flex;
      align-items: center;
      padding: 14px 12px;
      padding-left: 20px;
      border-bottom: 1px solid var(--border);
    }

    .app-title {
      color: #f9fafb;
      font-size: 2.3rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
    }
    .app-title:hover { color: #e5e7eb; }
    .app-title i { margin-right: 10px; font-size: 1.9rem; }

    #sidebar-wrapper .p-4 { padding-left: 12px; padding-right: 12px; padding-top: 14px; }

    #sidebar-wrapper .menu-group-title {
      padding: 15px 15px 5px var(--menu-left);
      font-size: 14px;
      font-weight: 600;
      color: #99a9b8;
      border-bottom: 1px solid var(--border);
      margin-bottom: 5px;
      white-space: nowrap;
    }

    #sidebar-wrapper .menu-item {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      padding-left: var(--menu-left);
      border-radius: 6px;
      color: #d5d9dc;
      transition: background-color 0.2s;
      font-size: 18px !important;
      white-space: nowrap;
    }

    #sidebar-wrapper .menu-item i {
      width: var(--icon-width);
      text-align: center;
      margin-right: var(--icon-gap);
      font-size: 18px;
    }

    .menu-item:hover, .menu-item.active-menu { background-color: var(--hover); color: #ffffff; }

    body.sidebar-collapsed .menu-item-text,
    body.sidebar-collapsed .menu-group-title,
    body.sidebar-collapsed .app-title span { display: none; }

    body.sidebar-collapsed .menu-item { padding-left: 0; justify-content: center; }
    body.sidebar-collapsed .menu-item i { margin-right: 0; font-size: 20px; }
    body.sidebar-collapsed .app-title i { margin-right: 0; }

    /* 舊版樣式兼容 */
    #page-wrapper .page-header {
      padding-bottom: 9px;
      margin: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 28px;
      color: #f7f7f7;
      margin-left: 10px;
    }
    #page-wrapper .panel { background-color: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 20px; }
    #page-wrapper .panel-heading { margin-top: 20px; padding: 10px 5px; }
    #page-wrapper .panel-body { padding: 15px; }
    /* ===============================
   Topbar 放大一點點（☰ / Home / Search / Ctrl+K）
================================ */

/* 1) 按鈕變大 */
.topbar-btn,
.home-pill{
  width: 44px;
  height: 44px;
}

/* 2) icon 變大 */
.topbar-btn i,
.home-pill i{
  font-size: 18px;
}

/* 3) 搜尋框變高、字變大、padding 跟著調 */
.search-box{
  height: 44px;
  font-size: 16px;
  padding: 0 700px 0 48px;   /* 右側留給 Ctrl+K，左側留給 icon */
  border-radius: 14px;
}

/* 4) 放大鏡 icon 跟著對齊 */
.search-icon{
  left: 16px;
  font-size: 16px;
}

/* 5) Ctrl+K 膠囊放大一點點 */
.kbd-hint{
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 12px;
}

/* 6) 下拉結果字體也順手放大一點 */
.result-item{
  font-size: 15px;
  padding: 12px 14px;
}

  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const body = document.body;
      const sidebarToggle = document.getElementById('sidebar-toggle');
      const sidebar = document.getElementById('sidebar-wrapper');
      const page = document.getElementById('page-wrapper');

      const searchInput = document.getElementById('toolSearch');
      const resultsBox = document.getElementById('tool-search-results');

      const toolLinks = Array.from(document.querySelectorAll('#sidebar-wrapper a.menu-item'));

      // 群組區塊（h3 + ul）→ 用來做整組顯示/隱藏
      const groupBlocks = Array.from(document.querySelectorAll('#sidebar-wrapper h3.menu-group-title'))
        .map(h3 => {
          let ul = h3.nextElementSibling;
          while (ul && ul.tagName !== 'UL') ul = ul.nextElementSibling;
          return { h3, ul };
        });

      // 建索引（文字 / href / icon / group）
      const index = toolLinks.map(a => {
        const text = (a.querySelector('.menu-item-text')?.innerText || a.innerText || '').trim();
        const href = a.getAttribute('href') || '#';
        const iconClass = a.querySelector('i')?.className || 'fas fa-wrench';

        // 找最近 group title
        let group = '';
        const ul = a.closest('ul');
        if (ul) {
          let prev = ul.previousElementSibling;
          while (prev && prev.tagName !== 'H3') prev = prev.previousElementSibling;
          if (prev && prev.tagName === 'H3') group = prev.innerText.trim();
        }
        return { a, text, href, iconClass, group };
      });

      // ===== sidebar 收合 =====
      const isCollapsed = localStorage.getItem('sidebar-state') === 'collapsed';
      if (isCollapsed) body.classList.add('sidebar-collapsed');

      sidebarToggle.addEventListener('click', () => {
        body.classList.toggle('sidebar-collapsed');
        localStorage.setItem('sidebar-state', body.classList.contains('sidebar-collapsed') ? 'collapsed' : 'expanded');
      });

      // ===== 記住滾動（維持你原邏輯）=====
      const sidebarTop = sessionStorage.getItem('sidebarScrollTop');
      const pageTop = sessionStorage.getItem('pageScrollTop');
      if (sidebar && sidebarTop !== null) sidebar.scrollTop = parseInt(sidebarTop, 10);
      if (page && pageTop !== null) page.scrollTop = parseInt(pageTop, 10);

      document.querySelectorAll('#sidebar-wrapper a').forEach(link => {
        link.addEventListener('click', () => {
          if (sidebar) sessionStorage.setItem('sidebarScrollTop', sidebar.scrollTop);
          if (page) sessionStorage.setItem('pageScrollTop', page.scrollTop);
        });
      });

      // Active menu（維持你原邏輯）
      const currentPath = window.location.pathname;
      document.querySelectorAll('#sidebar-wrapper a').forEach(link => {
        link.classList.toggle('active-menu', link.getAttribute('href') === currentPath);
      });

      // ===== 工具搜尋：重點是「不要跳頁」，要觸發原本 click 行為 =====

      function setSidebarFilter(query) {
        const q = query.trim().toLowerCase();

        if (!q) {
          toolLinks.forEach(a => a.style.display = '');
          groupBlocks.forEach(({h3, ul}) => {
            if (h3) h3.style.display = '';
            if (ul) ul.style.display = '';
          });
          return;
        }

        toolLinks.forEach(a => {
          const text = (a.querySelector('.menu-item-text')?.innerText || a.innerText || '').toLowerCase();
          a.style.display = text.includes(q) ? '' : 'none';
        });

        groupBlocks.forEach(({h3, ul}) => {
          if (!ul) return;
          const anyVisible = Array.from(ul.querySelectorAll('a.menu-item')).some(a => a.style.display !== 'none');
          h3.style.display = anyVisible ? '' : 'none';
          ul.style.display = anyVisible ? '' : 'none';
        });
      }

      function searchTools(query) {
        const q = query.trim().toLowerCase();
        if (!q) return [];

        return index
          .filter(it => it.text.toLowerCase().includes(q))
          .sort((a, b) => {
            const ai = a.text.toLowerCase().indexOf(q);
            const bi = b.text.toLowerCase().indexOf(q);
            if (ai !== bi) return ai - bi;
            return a.text.length - b.text.length;
          });
      }

      let activeIdx = -1;

      function renderDropdown(matches, query) {
        if (!query.trim()) {
          resultsBox.style.display = 'none';
          resultsBox.innerHTML = '';
          activeIdx = -1;
          return;
        }

        resultsBox.style.display = 'block';

        if (matches.length === 0) {
          resultsBox.innerHTML = `<div class="result-empty">找不到符合的工具</div>`;
          activeIdx = -1;
          return;
        }

        const top = matches.slice(0, 8);
        resultsBox.innerHTML = top.map((m, i) => `
          <div class="result-item" data-idx="${i}">
            <i class="${m.iconClass}"></i>
            <span>${m.text}</span>
            <span class="path">${m.group || ''}</span>
          </div>
        `).join('');

        // 點擊下拉：用 a.click() 觸發你原本的工具載入行為
        resultsBox.querySelectorAll('.result-item').forEach(item => {
          item.addEventListener('click', () => {
            const idx = parseInt(item.getAttribute('data-idx'), 10);
            const chosen = top[idx];
            if (chosen && chosen.a) chosen.a.click();   // ✅重點：不跳轉，觸發原 click
            resultsBox.style.display = 'none';
          });
        });
      }

      function highlightActive() {
        const items = Array.from(resultsBox.querySelectorAll('.result-item'));
        items.forEach(el => el.classList.remove('active'));
        if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].classList.add('active');
      }

      searchInput.addEventListener('input', () => {
        const q = searchInput.value;
        const matches = searchTools(q);
        setSidebarFilter(q);
        renderDropdown(matches, q);
        activeIdx = -1;
        highlightActive();
      });

      // 鍵盤操作：上下選、Enter 觸發 click
      searchInput.addEventListener('keydown', (e) => {
        const matches = searchTools(searchInput.value).slice(0, 8);
        const items = resultsBox.querySelectorAll('.result-item');

        if (e.key === 'ArrowDown') {
          if (matches.length === 0) return;
          e.preventDefault();
          activeIdx = Math.min(activeIdx + 1, matches.length - 1);
          highlightActive();
          return;
        }

        if (e.key === 'ArrowUp') {
          if (matches.length === 0) return;
          e.preventDefault();
          activeIdx = Math.max(activeIdx - 1, 0);
          highlightActive();
          return;
        }

        if (e.key === 'Enter') {
          e.preventDefault();
          const pick = (activeIdx >= 0 ? matches[activeIdx] : matches[0]);
          if (pick && pick.a) pick.a.click();          // ✅重點：觸發原 click
          resultsBox.style.display = 'none';
          return;
        }

        if (e.key === 'Escape') {
          searchInput.value = '';
          setSidebarFilter('');
          renderDropdown([], '');
          resultsBox.style.display = 'none';
          searchInput.blur();
        }
      });

      // 點外面關閉 dropdown（sidebar 篩選保留）
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrap')) resultsBox.style.display = 'none';
      });

      // Ctrl+K 聚焦
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          searchInput.focus();
        }
      });
    });
  </script>

</div>
</body>
</html>

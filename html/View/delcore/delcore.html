<script src="./delcore.js"></script>

<div id="page-wrapper" class="max-hight">
    <div class="row">
        <div class="col-lg-12">
            <h1 class="page-header">Core 刪卡</h1>
        </div>
    </div>

    <div class="row">
        <div id="app" class="container-fluid">

            <!-- 面板深色化 -->
            <div class="panel panel-info"
                style="
                    border-color: #00323e;
                    padding: 15px;
                    background-color: #0f1f26;    /* 面板深色背景 */
                    color: #ffffff;                /* 文字變白 */
                ">

                <!-- ====== 刪卡區塊 ====== -->
                <form method="GET" action="#" id="cards-form">

                    <div class="form-inline" style="margin-bottom: 10px;">

                        <div class="form-group" style="margin-right: 15px;">
                            <label for="card_type">卡別:</label>
                            <select name="card_type" id="card_type"
                                class="form-control"
                                style="width: 150px;">
                                <option value="">請選擇</option>
                            </select>
                        </div>

                        <div class="form-group" style="margin-right: 10px;">
                            <label for="card_no">內碼:</label>
                            <input type="text" name="card_no" id="card_no"
                                   class="form-control"
                                   autocomplete="off" style="width:180px;">
                        </div>

                        <button type="button" id="del" class="btn btn-primary">刪除</button>
                    </div>

                    <!-- 分隔線調成深色 -->
                    <hr style=" border-color:#ffffff;margin:top 20px;margin-bottom: 20px;">

                    <!-- ====== 查詢外觀卡號 ====== -->
                    <div class="form-inline" style="margin-bottom: 10px;">

                        <div class="form-group" style="margin-right: 10px;">
                            <label for="searchCardNo">查詢外觀卡號:</label>
                            <input type="text" id="searchCardNo"
                                   class="form-control"
                                   autocomplete="off"
                                   style="width: 180px;">
                        </div>

                        <button class="btn btn-primary" id="copy_out_json">複製 Json</button>
                    </div>

                    <!-- ====== JSON 輸出區深色 ====== -->
                    <textarea id="outJson"
                        style="
                            width: 100%;
                            min-height: 300px;
                            background-color: #ffffff;  /* 深色背景 */
                            color: #000000;             /* 白字 */
                            resize: vertical;
                            box-sizing: border-box;
                            padding: 10px;
                            border-radius: 4px;
                            border: 1px solid #33525e; /* 深色邊框 */
                        ">
                    </textarea>

                </form>

            </div>
        </div>
    </div>
</div>
